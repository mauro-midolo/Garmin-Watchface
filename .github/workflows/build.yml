name: Build

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DEVICE: fenix6pro
  APP_NAME: FenixWatchface

jobs:
  build:
    name: Build .iq / .prg
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Make monkeyc executable
        run: chmod +x sdk/monkeyc

      - name: Set up Connect IQ devices
        run: |
          mkdir -p "$HOME/.Garmin/ConnectIQ/Devices"
          cp -r sdk/devices/* "$HOME/.Garmin/ConnectIQ/Devices/"

      - name: Prepare developer key
        env:
          DEVELOPER_KEY: ${{ secrets.DEVELOPER_KEY }}
        run: |
          if [ -n "$DEVELOPER_KEY" ]; then
            echo "$DEVELOPER_KEY" | base64 -d > developer_key.der
          else
            echo "::warning::Secret DEVELOPER_KEY non impostato, genero chiave temporanea."
            openssl genrsa -out /tmp/dev.pem 4096
            openssl pkcs8 -topk8 -inform PEM -outform DER \
              -in /tmp/dev.pem -out developer_key.der -nocrypt
          fi

      - name: Build .prg (debug)
        run: |
          sdk/monkeyc \
            -d "$DEVICE" \
            -f monkey.jungle \
            -o "$APP_NAME.prg" \
            -y developer_key.der \
            -a sdk/api.db \
            -b sdk/api.mir \
            -i sdk/api.debug.xml \
            -w

      - name: Build .iq (release)
        run: |
          sdk/monkeyc \
            -e \
            -f monkey.jungle \
            -o "$APP_NAME.iq" \
            -y developer_key.der \
            -a sdk/api.db \
            -b sdk/api.mir \
            -i sdk/api.debug.xml \
            -w

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: connectiq-build
          path: |
            ${{ env.APP_NAME }}.prg
            ${{ env.APP_NAME }}.iq
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: connectiq-build

      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            XY=$(echo "$LATEST" | grep -oP 'v\d+\.\d+')
            Z=$(echo "$LATEST" | grep -oP '\d+$')
            NEXT="${XY}.$((Z + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.version.outputs.tag }}" \
            "${{ env.APP_NAME }}.prg" \
            "${{ env.APP_NAME }}.iq"
